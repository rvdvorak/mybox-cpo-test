# Shared station service definition (architektura 9, 10.2).
x-station-common: &station-common
  build:
    context: ./simulator
  networks:
    - cpo-net
  # Stations need the broker before they can connect / publish (architektura 9).
  depends_on:
    mosquitto:
      condition: service_healthy

# ENV common to every station; per-service overrides follow (architektura 10.1).
x-station-env: &station-env
  MQTT_HOST: mosquitto
  MQTT_PORT: 1883
  FAULT_RECOVERY_SEC: 30
  CONNECTOR_TYPE: AC
  FIRMWARE_VERSION: 1.0.0

services:
  mosquitto:
    # MQTT broker - Eclipse Mosquitto (architektura sekce 2, 3.7)
    image: eclipse-mosquitto:2.1-alpine
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - cpo-net
    # Anonymous publish proves the broker accepts connections on 1883
    # (allow_anonymous true, architektura 3.7). mosquitto_pub ships in the image.
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "healthcheck", "-m", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  db:
    # PostgreSQL — clean, no TimescaleDB in MVP (architektura sekce 2, 6).
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: cpo
      POSTGRES_USER: cpo
      POSTGRES_PASSWORD: cpo
      # Explicit data dir — the named volume mounts exactly here. Set explicitly
      # rather than assuming the image default (postgres 18 layout, Phase 7).
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - cpo-db-data:/var/lib/postgresql/data
    networks:
      - cpo-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "cpo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    # FastAPI backend — domain layer + DB schema + MQTT adapter
    # (architektura sekce 3, 5, 6).
    build:
      context: ./backend
    # Backend connects to both the broker and the DB on startup; wait for both.
    depends_on:
      mosquitto:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: cpo
      DB_USER: cpo
      DB_PASSWORD: cpo
      BACKEND_PORT: 3000
      PRICE_PER_KWH: 5.50
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      HEARTBEAT_TIMEOUT_SEC: 90
      # Origin allowed by the backend's CORS policy (architektura 7).
      FRONTEND_PORT: 8080
    ports:
      - "3000:3000"
    networks:
      - cpo-net
    # GET /api/stations -> 200 confirms the API serves AND the DB is reachable
    # (architektura 7.1). curl ships in the full python:3.14 (buildpack-deps)
    # image. Longer start_period: schema init + seed + bounded DB-connect retry.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/stations"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    # React SPA — Vite dev server (architektura sekce 8).
    build:
      context: ./frontend
    # Frontend talks to the backend API; wait until the backend serves.
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Backend URL as seen from the browser; consumed via VITE_API_URL.
      VITE_API_URL: ${API_URL:-http://localhost:3000}
    ports:
      - "8080:8080"
    networks:
      - cpo-net
    # node:22-alpine has no curl; busybox wget probes the Vite dev server.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  station-1:
    <<: *station-common
    environment:
      <<: *station-env
      STATION_ID: ST-001
      MAX_POWER_KW: 22.0
      FAULT_PROBABILITY: 0.02
      MONITORING_AGENT: none

  station-2:
    <<: *station-common
    environment:
      <<: *station-env
      STATION_ID: ST-002
      MAX_POWER_KW: 11.0
      FAULT_PROBABILITY: 0.02
      MONITORING_AGENT: rpi

  station-3:
    <<: *station-common
    environment:
      <<: *station-env
      STATION_ID: ST-003
      MAX_POWER_KW: 22.0
      # Demo fault station - high fault probability (architektura 10.2).
      FAULT_PROBABILITY: 0.30
      MONITORING_AGENT: none

  station-4:
    <<: *station-common
    environment:
      <<: *station-env
      STATION_ID: ST-004
      MAX_POWER_KW: 22.0
      FAULT_PROBABILITY: 0.02
      MONITORING_AGENT: none

  station-5:
    <<: *station-common
    environment:
      <<: *station-env
      STATION_ID: ST-005
      MAX_POWER_KW: 7.4
      FAULT_PROBABILITY: 0.02
      MONITORING_AGENT: none

networks:
  cpo-net:
    driver: bridge

volumes:
  mosquitto-data:
  mosquitto-log:
  # Persistent Postgres data — survives `docker compose down` (without -v).
  cpo-db-data:
